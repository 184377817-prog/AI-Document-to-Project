name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Recalculate evaluation summary
        run: python evaluation/summarize_results.py --output /tmp/evaluation-summary.json
      - name: Verify Excel demo
        run: python src/excel_to_project_demo.py demo/sample_project_plan.xlsx --output /tmp/generated-project.json
